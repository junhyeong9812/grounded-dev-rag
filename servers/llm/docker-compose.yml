# .164 로컬 LLM — Ollama + Qwen2.5 7B, OpenAI 호환 API
# 역할: 역할 C(다이제스트) — 검색 청크를 읽고 질문에 맞춰 정제. 최종 합성은 Claude.
# 배포: 이 디렉토리를 .164로 동기 후  docker compose up -d  →  docker exec llm-ollama ollama pull qwen2.5:7b
#
# 참고: 고급 스택으로 vLLM을 먼저 시도했으나 vLLM 0.23이 VLLM_ATTENTION_BACKEND env를 무시하고
#       FlashInfer를 강제 → RTX 2070S(Turing, compute 7.5)에서 추론 크래시(BatchPrefill invalid argument).
#       Ollama(llama.cpp)는 Turing 안정. vLLM 재시도는 docker-compose.vllm.yml 보존.

services:
  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    volumes:
      - ollama:/root/.ollama
    ports:
      - "11434:11434"        # .9 오케스트레이터가 호출 (OpenAI 호환 /v1)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  ollama:
